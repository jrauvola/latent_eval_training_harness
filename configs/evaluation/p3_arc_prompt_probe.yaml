runtime:
  output_dir: artifacts/eval/p3_arc_prompt_probe
  cache_dir: .cache/huggingface
  snapshot_dir: artifacts/datasets
  device: auto
  batch_size: 4
  max_examples_per_benchmark: 25
  max_new_tokens: 32
  greedy: true
  temperature: 0.1
  top_k: 40
  top_p: 0.95

benchmarks:
  - p3_arc_challenge_letter
  - p3_arc_challenge_text
  - p3_arc_challenge_qa_options

models:
  - name: base_gpt2
    checkpoint_source:
    checkpoint_type: base_model
    model_kind: causal_lm
    inference_strategy: standard_generation
    model:
      base_model_name_or_path: gpt2
      use_lora: false
    runtime:
      model_max_length: 512
      num_latent: 0
      use_prj: false
      bf16: false
  - name: codi_gpt2_official
    checkpoint_source: zen-E/CODI-gpt2
    checkpoint_type: hf_repo
    model_kind: latent_runtime
    inference_strategy: latent_cot
    model:
      base_model_name_or_path: gpt2
      lora_r: 128
      lora_alpha: 32
      use_lora: true
    runtime:
      model_max_length: 512
      num_latent: 6
      use_prj: true
      prj_dim: 768
      prj_dropout: 0.0
      remove_eos: true
      bf16: false
